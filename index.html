<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Image Audit Ledger — Gemini Vision QA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F1F4F3;
    --surface:#FFFFFF;
    --surface-2:#F7FAF9;
    --ink:#16201D;
    --ink-soft:#5B6864;
    --ink-faint:#8B958F;
    --line:#DCE3E0;
    --line-strong:#C4CEC9;
    --accent:#0C6E78;
    --accent-dark:#085059;
    --accent-soft:#E2EEEE;
    --pass:#1F7A4D;
    --pass-soft:#E3F1E8;
    --fail:#B23B20;
    --fail-soft:#FBE7E1;
    --warn:#A8740C;
    --warn-soft:#F6EBD3;
    --radius-card:14px;
    --radius-ctl:9px;
    --shadow-1: 0 1px 2px rgba(22,32,29,0.04), 0 1px 1px rgba(22,32,29,0.03);
    --font-display:'Space Grotesk', 'Inter', sans-serif;
    --font-body:'Inter', system-ui, -apple-system, sans-serif;
    --font-mono:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  *{ box-sizing:border-box; }
  html{ -webkit-text-size-adjust:100%; height: 100%; }
  body{
    margin:0; height: 100vh; display: flex; flex-direction: column;
    background: var(--bg); color:var(--ink); font-family:var(--font-body);
    line-height:1.5; -webkit-font-smoothing:antialiased;
  }

  ::selection{ background:var(--accent-soft); color:var(--accent-dark); }
  a{ color:var(--accent); }
  :focus-visible{ outline:2px solid var(--accent); outline-offset:2px; border-radius:4px; }

  /* ---------- Header ---------- */
  header.top{
    display:flex; align-items:center; justify-content:space-between; gap:20px;
    padding: 16px 24px; background: var(--surface); border-bottom:1px solid var(--line); flex-shrink: 0;
  }
  .brand{ display:flex; align-items:center; gap:12px; }
  .brand-mark{
    width:36px; height:36px; border-radius:10px;
    background:linear-gradient(150deg, var(--accent), var(--accent-dark));
    display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-1);
  }
  .brand-mark svg{ width:20px; height:20px; }
  .brand-text h1{ font-family:var(--font-display); font-size:18px; font-weight:700; margin:0; }

  .global-config{ display:flex; align-items:center; gap: 16px; }
  .cfg-group{ display:flex; align-items:center; gap: 8px; }
  .cfg-label{ font-size: 13px; font-weight: 600; color: var(--ink-soft); }
  
  input[type="password"], input[type="text"], input[type="number"], select, textarea {
    font-family:var(--font-body); font-size:13px; padding:8px 12px;
    border:1px solid var(--line-strong); border-radius:var(--radius-ctl);
    background:var(--surface); color:var(--ink); transition:border-color .15s ease;
  }
  input::placeholder, textarea::placeholder{ color:var(--ink-faint); }
  input:focus, select:focus, textarea:focus{ border-color:var(--accent); outline:none; }

  /* API Key Wrapper */
  .input-with-icon { position: relative; display: flex; align-items: center; }
  .input-with-icon input { padding-right: 36px; }
  .icon-btn {
    position: absolute; right: 4px; background: transparent; border: none; color: var(--ink-soft);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 6px;
  }
  .icon-btn:hover { background: var(--surface-2); color: var(--ink); }

  /* ---------- Layout Split ---------- */
  .layout{ display: flex; flex: 1; overflow: hidden; }
  .panel{ flex: 1; display: flex; flex-direction: column; padding: 24px; overflow-y: auto; }
  .panel-left{ border-right: 1px solid var(--line); background: var(--surface-2); }
  .panel-right{ background: var(--bg); }

  .panel-header{ display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .panel-header h2{ font-family:var(--font-display); font-size: 18px; margin: 0; }

  /* ---------- Left: Checklists ---------- */
  .checklist-card{
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius-card); padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow-1);
  }
  .cl-header{ display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
  .cl-title-row { display: flex; align-items: baseline; gap: 8px;}
  .cl-num{ font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: var(--accent); }
  .cl-title{ font-size: 14px; font-weight: 600; }
  .cl-section { font-size: 11px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.05em; }
  
  .file-upload-row{ display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .file-input-wrapper{ position: relative; overflow: hidden; display: inline-block; }
  .file-input-wrapper input[type=file] { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; width: 100%; }
  .btn-upload{
    font-size: 13px; font-weight: 500; padding: 6px 12px; border-radius: 6px;
    background: var(--surface-2); border: 1px solid var(--line-strong); cursor: pointer;
  }
  .file-name{ font-family: var(--font-mono); font-size: 12px; color: var(--ink-soft); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
  
  /* Accordion */
  details.prompt-accordion { border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  details.prompt-accordion summary {
    font-size: 13px; font-weight: 500; color: var(--ink-soft); padding: 8px 12px;
    background: var(--surface-2); cursor: pointer; user-select: none; list-style: none;
  }
  details.prompt-accordion summary::-webkit-details-marker { display: none; }
  details.prompt-accordion summary:hover { background: var(--line); color: var(--ink); }
  .prompt-content { padding: 12px; background: var(--surface); border-top: 1px solid var(--line); }
  .prompt-content textarea { width: 100%; height: 160px; resize: vertical; line-height: 1.4; font-family: var(--font-mono); font-size: 12px; }

  /* Pagination */
  .pagination { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; padding-top: 16px; border-top: 1px solid var(--line); }
  .page-info { font-size: 13px; font-weight: 500; color: var(--ink-soft); }

  /* ---------- Buttons ---------- */
  .btn{
    font-family:var(--font-body); font-size:14px; font-weight:600;
    padding:10px 18px; border-radius:var(--radius-ctl); border:1px solid transparent;
    cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:8px;
    transition:transform .08s ease, opacity .15s ease, background .15s ease;
  }
  .btn:active{ transform:translateY(1px); }
  .btn:disabled{ opacity:0.45; cursor:not-allowed; transform:none; }
  .btn-primary{ background:var(--accent); color:#fff; width: 100%; font-size: 15px; padding: 14px;}
  .btn-primary:hover:not(:disabled){ background:var(--accent-dark); }
  .btn-secondary{ background:transparent; color:var(--ink); border:1px solid var(--line-strong); padding: 8px 14px; font-size: 13px; }
  .btn-secondary:hover:not(:disabled){ background:var(--surface-2); }

  /* ---------- Right: Results & Score ---------- */
  .score-card{
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-card); 
    padding: 24px; margin-bottom: 24px; box-shadow: var(--shadow-1);
    display: flex; align-items: center;
  }
  .score-left{ flex: 1; text-align: center; }
  .score-divider{ width: 1px; align-self: stretch; background: var(--line); margin: 0 24px; }
  .score-right{ flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 10px; }
  .score-top{ display: flex; align-items: center; justify-content: center; gap: 10px; }
  .score-val{ font-family: var(--font-display); font-size: 36px; font-weight: 700; color: var(--ink); }
  .score-label{ font-size: 14px; color: var(--ink-soft); margin-top: 4px; }
  .score-val.pass{ color: var(--pass); }

  .stat-row{ display: flex; align-items: center; justify-content: space-between; gap: 12px; font-family: var(--font-mono); font-size: 13px; }
  .stat-row .stat-label{ color: var(--ink-faint); }
  .stat-row .stat-value{ font-weight: 700; color: var(--ink); }
  .stats-empty{ font-size: 13px; color: var(--ink-faint); }

  .status-pill{ font-family: var(--font-mono); font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 4px 9px; border-radius: 20px; border: 1px solid transparent; }
  .status-pill.idle{ background: var(--surface-2); color: var(--ink-soft); border-color: var(--line-strong); }
  .status-pill.processing{ background: var(--accent-soft); color: var(--accent-dark); border-color: var(--accent); }
  .status-pill.completed{ background: var(--pass-soft); color: var(--pass); border-color: #BFE0CC; }
  
  .results-actions { display: flex; gap: 12px; margin-bottom: 24px; }

  .results-feed{ display: flex; flex-direction: column; gap: 12px; }
  .feed-item{
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-card); 
    padding: 16px; display: grid; grid-template-columns: auto 1fr; gap: 16px; align-items: start;
    box-shadow: var(--shadow-1);
  }
  .feed-thumb{ width: 56px; height: 56px; border-radius: 8px; object-fit: cover; background: var(--surface-2); border: 1px solid var(--line); }
  
  .feed-body h3{ font-size: 14px; font-weight: 600; margin: 0 0 6px; }
  .feed-reason{ font-size: 13px; color: var(--ink-soft); margin: 0 0 10px; line-height: 1.4; }
  
  .feed-badges { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  
  .status-badge{ font-family: var(--font-mono); font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 4px 8px; border-radius: 6px; border: 1px solid transparent; }
  .status-badge.pass{ background: var(--pass-soft); color: var(--pass); border-color: #BFE0CC;}
  .status-badge.fail{ background: var(--fail-soft); color: var(--fail); border-color: #F0C4B8;}
  .status-badge.error{ background: var(--warn-soft); color: var(--warn); border-color: #EAD79C;}
  .status-badge.neutral{ background: var(--surface-2); color: var(--ink-soft); border-color: var(--line-strong); }
  
  .conf-pill{ font-family: var(--font-mono); font-size: 12px; color: var(--ink-faint); margin-left: auto; }
  .empty-state{ text-align: center; padding: 40px 20px; color: var(--ink-faint); font-size: 14px; }
</style>
</head>
<body>

  <header class="top">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 7a2 2 0 0 1 2-2h2.2l1-1.4A1 1 0 0 1 9 3h6a1 1 0 0 1 .8.6L16.8 5H19a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z" stroke="#fff" stroke-width="1.6"/>
          <circle cx="12" cy="13" r="3.4" stroke="#fff" stroke-width="1.6"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>Image Audit Ledger</h1>
      </div>
    </div>

    <div class="global-config">
      <div class="cfg-group">
        <label class="cfg-label" for="apiKeyInput">API Key</label>
        <div class="input-with-icon">
          <input type="password" id="apiKeyInput" placeholder="AIza..." style="width: 180px;" autocomplete="off" />
          <button type="button" class="icon-btn" id="toggleKeyBtn" title="Show / hide key">
            <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7Z" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/></svg>
          </button>
        </div>
      </div>
      <div class="cfg-group">
        <label class="cfg-label" for="modelSelect">Model</label>
        <select id="modelSelect">
          <option value="gemini-3.5-flash">gemini-3.5-flash</option>
          <option value="gemini-3.1-pro-preview">gemini-3.1-pro-preview</option>
          <option value="gemini-3.1-flash-lite" selected>gemini-3.1-flash-lite</option>
          <option value="gemini-2.5-pro">gemini-2.5-pro</option>
          <option value="gemini-2.5-flash">gemini-2.5-flash</option>
        </select>
      </div>
      <div class="cfg-group">
        <label class="cfg-label" for="delayInput">Delay (ms)</label>
        <input type="number" id="delayInput" value="1000" min="0" max="10000" step="50" style="width: 80px;" />
      </div>
    </div>
  </header>

  <div class="layout">
    <div class="panel panel-left">
      <div class="panel-header">
        <h2>Audit Checklists</h2>
        <div class="cfg-group">
          <label class="cfg-label">Items per page:</label>
          <select id="qtySelect">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="all" selected>All</option>
          </select>
        </div>
      </div>
      
      <div id="checklistContainer">
        </div>

      <div class="pagination">
        <button class="btn-secondary" id="prevBtn" disabled>Previous</button>
        <span class="page-info" id="pageInfo">Page 1 of X</span>
        <button class="btn-secondary" id="nextBtn">Next</button>
      </div>
    </div>

    <div class="panel panel-right">
      <div class="panel-header">
        <h2>Results & Score</h2>
      </div>

      <div class="score-card">
        <div class="score-left">
          <div class="score-top">
            <div class="score-val" id="scoreValue">—</div>
            <span class="status-pill idle" id="statusPill">Idle</span>
          </div>
          <div class="score-label" id="scoreLabel">Pass Rate</div>
        </div>
        <div class="score-divider"></div>
        <div class="score-right" id="scoreStats">
          <span class="stats-empty">No checklist run yet</span>
        </div>
      </div>

      <div class="results-actions">
        <button class="btn btn-primary" id="runBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 4.5v15l13-7.5-13-7.5Z" fill="currentColor"/></svg>
          Run Audit
        </button>
        <button class="btn btn-secondary" id="clearBtn">
          Clear
        </button>
        <button class="btn btn-secondary" id="exportBtn" style="display:none;">
          Export CSV
        </button>
      </div>

      <div class="results-feed" id="resultsFeed">
        <div class="empty-state">Upload images on the left and run the audit. Un-uploaded checklists will be skipped automatically.</div>
      </div>
    </div>
  </div>

<script>
(function(){
  "use strict";

  // The 32-item checklist, fully optimized for LLM visual verification
  const DEFAULT_CHECKPOINTS = [
    { sr: 1, section: "Section A1: Exterior, Access & First Impression", label: "Main Brand Signage & Illumination", rule: "Examine the main brand signage. It must be fully visible, legible, and evenly illuminated. Fail the image if the sign is broken, hidden by obstructions (like trees or banners), has burnt-out/dead bulbs, or is noticeably shadowed or unreadable." },
    { sr: 2, section: "Section A1: Exterior, Access & First Impression", label: "Paved Approach, Driveway & Gates", rule: "Look at the driveway and paved entrance. A pass requires a clean, well-maintained surface. Fail the image if you see large dark oil stains, accumulated litter/garbage, standing water puddles, or severe cracks/potholes." },
    { sr: 3, section: "Section A1: Exterior, Access & First Impression", label: "Customer Parking Allocation", rule: "Check the designated customer parking bays. They should be empty or hold standard civilian cars. Fail the image if these specific customer spots are occupied by identical dealership fleet cars, test-drive vehicles (with decals), or staff vehicles." },
    { sr: 4, section: "Section A1: Exterior, Access & First Impression", label: "Valet Desk & Security Guard Presence", rule: "Locate the valet or security desk at the entrance. A pass requires a guard or attendant to be physically present and visibly attentive (standing or sitting upright). Fail if the desk is completely empty or the attendant is clearly slouching, sleeping, or distracted." },
    { sr: 5, section: "Section A1: Exterior, Access & First Impression", label: "Entrance Glass Doors & Tracks", rule: "Inspect the main glass entrance doors and their bottom tracks. The glass should be mostly transparent and clean. Fail the image if there are highly visible, distracting grease smudges, large handprints, or heavy dirt/debris clogging the floor tracks." },
    { sr: 6, section: "Section A1: Exterior, Access & First Impression", label: "Foot Mats & Welcome Walkway", rule: "Examine the welcome foot mat at the entrance. It should lay flat and be aligned with the door. Fail if the mat is severely crooked, folded over, curling at the edges, or heavily soiled." },
    { sr: 7, section: "Section A2: Interior Hygiene, Facility Upkeep & Ambience", label: "Main Floor Cleanliness", rule: "Look at the main showroom floor. It should appear clean with a uniform shine or finish. Fail the image if you see distinct dull patches, dark scuff marks, wet spills, or noticeable dirt/stains." },
    { sr: 8, section: "Section A2: Interior Hygiene, Facility Upkeep & Ambience", label: "Ceiling Spotlights & Tracks", rule: "Examine the showroom ceiling lighting grid and spotlights. The lighting should be uniform. Fail the image if there are clearly visible burnt-out bulbs (dark spots in the fixtures) or fixtures hanging loose/broken." },
    { sr: 9, section: "Section A2: Interior Hygiene, Facility Upkeep & Ambience", label: "HVAC Diffusers & Ambient Temperature", rule: "Check any visible thermostat readings and the ceiling AC vents. Fail if the thermostat reads an uncomfortable extreme (e.g., above 26C/78F or below 18C/64F), or if the AC vents have visible, heavy black dust rings around them." },
    { sr: 10, section: "Section A2: Interior Hygiene, Facility Upkeep & Ambience", label: "Background Music & Scent Level", rule: "Since audio/scent cannot be heard/smelled, look for visible audio or scent equipment (speakers, diffusers). Pass if they appear intact and powered on. Fail if speakers are visibly damaged, wires are hanging out, or scent diffusers look broken/empty." },
    { sr: 11, section: "Section A2: Interior Hygiene, Facility Upkeep & Ambience", label: "Customer Lounge Seating Alignment", rule: "Look at the customer lounge area. The furniture should be arranged neatly. Fail the image if chairs/tables are haphazardly pushed together, blocking walkways, or if the tables are cluttered with trash." },
    { sr: 12, section: "Section A2: Interior Hygiene, Facility Upkeep & Ambience", label: "Hospitality Pantry & Coffee Bar", rule: "Inspect the coffee/pantry area. It should look stocked and hygienic. Fail the image if supplies (cups, stirrers) are depleted, countertops are stained/messy, or trash cans are visibly overflowing." },
    { sr: 13, section: "Section A2: Interior Hygiene, Facility Upkeep & Ambience", label: "Restroom Deep Hygiene (Male/Female)", rule: "Examine the restroom area. It must look sanitary. Fail the image if there are visible puddles of water on the floor, heavy streaks/stains on the mirrors, overflowing trash, or empty paper towel/tissue dispensers." },
    { sr: 14, section: "Section A3: Display Vehicles & Merchandising", label: "Display Cars Exterior Polish", rule: "Look at the paint finish of the cars displayed inside the showroom. They should have a high-gloss, clean reflection. Fail if the car body is covered in a visible layer of dust, has heavy smudges/fingerprints, or lacks a polished shine." },
    { sr: 15, section: "Section A3: Display Vehicles & Merchandising", label: "Wheel Rim & Tyre Dressing", rule: "Examine the wheels and tyres of the display cars. The tyres should be a deep, clean black and rims should be shining. Fail if the tyres show brown mud/dirt, or if the rims have visible brake dust, grime, or rust streaks." },
    { sr: 16, section: "Section A3: Display Vehicles & Merchandising", label: "Vehicle Cabin Cleanliness", rule: "Look inside the cabin of the display car (seats, footwells, console). It should be pristine. Fail the image if you see leftover mechanic rags, plastic protective wrap that should have been removed, paper floor mats, or random trash/clutter." },
    { sr: 17, section: "Section A3: Display Vehicles & Merchandising", label: "Display Vehicle Locking Status", rule: "Look for visual cues regarding the car doors. Since physical locking is hard to see, fail the image if a door is left completely ajar/open unattended, or if keys are visibly left sitting out on the roof or hood." },
    { sr: 18, section: "Section A3: Display Vehicles & Merchandising", label: "Spec Sheets & Digital Price Stands", rule: "Examine the vehicle specification boards or digital price stands next to the cars. Fail the image if the stand is completely blank, the paper is torn/falling off, or the digital screen is turned off or showing an error." },
    { sr: 19, section: "Section A4: Digital Aids, Connectivity & Phygital Assets", label: "Interactive Touch Kiosks", rule: "Look at the customer interactive screens/kiosks. They should display the dealership's app or branding. Fail if the screen is dead, showing a generic Windows/Android home screen, or displaying a system crash/error message." },
    { sr: 20, section: "Section A4: Digital Aids, Connectivity & Phygital Assets", label: "Large Scale Video Wall / AV Screens", rule: "Check the large promotional video walls or TVs. They should show clear video content. Fail the image if screens have dead black panels, are completely turned off, show static, or display a 'No Signal' / blue screen." },
    { sr: 21, section: "Section A4: Digital Aids, Connectivity & Phygital Assets", label: "Consultant Digital Tablets", rule: "Look at the sales consultant desks. There should be digital tablets visible for customer use. Fail if the desks are completely bare of digital presentation tools where they are normally expected." },
    { sr: 22, section: "Section A4: Digital Aids, Connectivity & Phygital Assets", label: "Wi-Fi Connectivity & Hotspots", rule: "Look for Wi-Fi signage or digital displays showing network status. Pass if Wi-Fi network details are clearly posted for customers. Fail if Wi-Fi signs are missing, torn, or if a visible router setup looks messy/unplugged." },
    { sr: 23, section: "Section A5: Test Drive (TD) Fleet Readiness", label: "TD Fleet Washing & Appearance", rule: "Inspect the exterior of the test drive (TD) fleet cars. They must look presentable. Fail the image if the cars are visibly dirty, covered in rain spots/mud, or show obvious, large scratches or dents on the body panels." },
    { sr: 24, section: "Section A5: Test Drive (TD) Fleet Readiness", label: "Dashboard Diagnostics & Warning Lights", rule: "Look at the illuminated dashboard of the test drive car. It should be clear of faults. Fail the image immediately if you see any red or amber warning lights glowing (e.g., Check Engine, Airbag, Low Tire Pressure, ABS)." },
    { sr: 25, section: "Section A5: Test Drive (TD) Fleet Readiness", label: "Fuel Levels & EV State of Charge", rule: "Check the fuel gauge or EV battery readout on the dash. Test drive cars need sufficient range. Fail the image if the fuel needle is hitting empty/reserve, or if the EV charge indicates less than 20% remaining." },
    { sr: 26, section: "Section A5: Test Drive (TD) Fleet Readiness", label: "Cabin Air Quality & Sanitization", rule: "Inspect the floor mats and seats inside the test drive car. It should be clean for the next customer. Fail if there are visible dirt clods, small stones, leaves, or noticeable stains on the carpets and seats." },
    { sr: 27, section: "Section A5: Test Drive (TD) Fleet Readiness", label: "Mandatory Safety Equipment", rule: "Look in the trunk or designated safety area of the test drive vehicle. It must carry emergency gear. Fail if required safety items (like a red fire extinguisher or emergency triangle case) are visibly missing or unsecured." },
    { sr: 28, section: "Section A5: Test Drive (TD) Fleet Readiness", label: "Glove Box Compliance Folders", rule: "Check the vehicle document folder (registration, insurance). While dates might be hard to read, fail the image if the document folder is missing, torn apart, or documents are haphazardly scattered across the passenger seat." },
    { sr: 29, section: "Section A6: Staff Grooming, Deportment & Workspace", label: "Corporate Uniform Compliance", rule: "Look at the dealership staff. They should be wearing the standard corporate uniform. Fail the image if staff are visibly wearing casual clothes (t-shirts, jeans, sneakers) or mismatched, untucked, sloppy attire." },
    { sr: 30, section: "Section A6: Staff Grooming, Deportment & Workspace", label: "ID Card Visibility", rule: "Examine the chest/lanyard area of the visible staff members. They must carry identification. Fail the image if the staff member is clearly interacting with customers but is NOT wearing a visible ID badge or name tag." },
    { sr: 31, section: "Section A6: Staff Grooming, Deportment & Workspace", label: "Personal Grooming Standards", rule: "Look at the general appearance of the staff. They should look professional. Fail if footwear is visibly dirty/unpolished, or if general grooming appears excessively unkempt or unprofessional for a corporate showroom." },
    { sr: 32, section: "Section A6: Staff Grooming, Deportment & Workspace", label: "Consultant Workstations & Desk Clutter", rule: "Inspect the sales consultant desks where customers sit. It should be clean and professional. Fail the image if the desk is cluttered with personal lunch boxes, gym bags, scattered loose papers, or messy cables." }
  ];

  const state = { checklists: [], results: [], currentPage: 1, itemsPerPage: 'all' };

  const $ = (id) => document.getElementById(id);
  const checklistContainer = $('checklistContainer');
  const qtySelect = $('qtySelect');
  const runBtn = $('runBtn');
  const clearBtn = $('clearBtn');
  const exportBtn = $('exportBtn');
  const resultsFeed = $('resultsFeed');
  const scoreValue = $('scoreValue');
  const scoreLabel = $('scoreLabel');
  const scoreStats = $('scoreStats');
  const statusPill = $('statusPill');
  const apiKeyInput = $('apiKeyInput');
  const toggleKeyBtn = $('toggleKeyBtn');
  const eyeIcon = $('eyeIcon');
  const modelSelect = $('modelSelect');
  const delayInput = $('delayInput');
  const prevBtn = $('prevBtn');
  const nextBtn = $('nextBtn');
  const pageInfo = $('pageInfo');

  // API Key Toggle
  toggleKeyBtn.addEventListener('click', () => {
    const show = apiKeyInput.type === 'password';
    apiKeyInput.type = show ? 'text' : 'password';
    eyeIcon.innerHTML = show
      ? '<path d="m3 3 18 18M10.6 10.7a2.6 2.6 0 0 0 3.7 3.7M9.3 5.3A10.8 10.8 0 0 1 12 5c6.4 0 10 7 10 7a14.6 14.6 0 0 1-3.2 4.1M6.6 6.6A14.7 14.7 0 0 0 2 12s3.6 7 10 7c1.2 0 2.3-.2 3.4-.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>'
      : '<path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7Z" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/>';
  });

  // Strict structured prompt enforcing the JSON format
  function buildDefaultPrompt(sr, label, rule) {
    return `You are an expert QA auditor reviewing an image for a facility compliance audit. Evaluate the image against the provided checklist item and its rule.

Checklist Number: ${sr}
Checklist Name: ${label}
Validation Rule: ${rule}

Perform the following evaluation:
1. Clear Image Check (YES/NO): Is the image clear, well-lit, and readable enough to evaluate this specific checkpoint?
2. Checklist Result (PASS/FAIL): Based strictly on visual evidence and the Validation Rule, does the image pass or fail? (If the image is completely unclear or the item is missing, this must be FAIL).
3. Reason: Provide a 1-2 sentence explanation citing what you visually observe.
4. Confidence: Provide an integer (0-100) representing your confidence in this assessment.

Respond ONLY with valid JSON using this exact structure:
{
  "checklist_number": "${sr}",
  "checklist_name": "${label}",
  "clear_image_check": "YES",
  "checklist_result": "PASS",
  "confidence": 95,
  "reason": "Brief reason here."
}`;
  }

  function initData() {
    state.checklists = DEFAULT_CHECKPOINTS.map((cp) => ({
      id: cp.sr,
      section: cp.section,
      label: cp.label,
      file: null,
      filename: 'No file selected',
      thumbBase64: null,
      promptText: buildDefaultPrompt(cp.sr, cp.label, cp.rule)
    }));
  }

  function renderPage() {
    checklistContainer.innerHTML = '';
    
    const totalItems = state.checklists.length;
    const itemsPer = state.itemsPerPage === 'all' ? totalItems : parseInt(state.itemsPerPage, 10);
    const totalPages = Math.ceil(totalItems / itemsPer);
    
    const startIndex = (state.currentPage - 1) * itemsPer;
    const endIndex = Math.min(startIndex + itemsPer, totalItems);

    for (let i = startIndex; i < endIndex; i++) {
      const item = state.checklists[i];
      const card = document.createElement('div');
      card.className = 'checklist-card';
      card.innerHTML = `
        <div class="cl-header">
          <div class="cl-section">${item.section}</div>
          <div class="cl-title-row">
            <span class="cl-num">#${item.id}</span>
            <span class="cl-title">${item.label}</span>
          </div>
        </div>
        
        <div class="file-upload-row">
          <div class="file-input-wrapper">
            <button class="btn-upload">${item.file ? 'Change Image' : 'Choose Image'}</button>
            <input type="file" accept="image/*" id="file-${item.id}" />
          </div>
          <span class="file-name" id="filename-${item.id}">${item.filename}</span>
        </div>

        <details class="prompt-accordion">
          <summary>Edit Prompt</summary>
          <div class="prompt-content">
            <textarea id="prompt-${item.id}">${item.promptText}</textarea>
          </div>
        </details>
      `;
      checklistContainer.appendChild(card);

      $(`file-${item.id}`).addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (file) {
          item.filename = file.name;
          $(`filename-${item.id}`).textContent = file.name;
          item.file = file;
          item.thumbBase64 = await fileToDataUrl(file);
          e.target.previousElementSibling.textContent = 'Change Image';
        } else {
          item.filename = 'No file selected';
          $(`filename-${item.id}`).textContent = item.filename;
          item.file = null;
          item.thumbBase64 = null;
          e.target.previousElementSibling.textContent = 'Choose Image';
        }
      });

      $(`prompt-${item.id}`).addEventListener('input', (e) => {
        item.promptText = e.target.value;
      });
    }

    pageInfo.textContent = state.itemsPerPage === 'all' ? `Showing All ${totalItems}` : `Page ${state.currentPage} of ${totalPages}`;
    prevBtn.disabled = state.currentPage === 1;
    nextBtn.disabled = state.currentPage === totalPages || state.itemsPerPage === 'all';
  }

  prevBtn.addEventListener('click', () => { if (state.currentPage > 1) { state.currentPage--; renderPage(); }});
  nextBtn.addEventListener('click', () => {
    const totalPages = Math.ceil(state.checklists.length / (parseInt(state.itemsPerPage, 10) || state.checklists.length));
    if (state.currentPage < totalPages) { state.currentPage++; renderPage(); }
  });
  qtySelect.addEventListener('change', () => { state.itemsPerPage = qtySelect.value; state.currentPage = 1; renderPage(); });

  initData();
  renderPage();

  // --- Helpers ---
  function fileToDataUrl(file){ return new Promise((resolve, reject) => { const reader = new FileReader(); reader.onload = () => resolve(String(reader.result)); reader.onerror = reject; reader.readAsDataURL(file); }); }
  function splitDataUrl(dataUrl){ const m = /^data:(.*?);base64,(.*)$/.exec(dataUrl); return { mimeType: m[1] || 'image/jpeg', base64: m[2] }; }
  function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }
  function escapeCsv(val){ return '"' + String(val || '').replace(/"/g, '""') + '"'; }

  // --- Status & Score helpers ---
  function setStatus(status) {
    // status: 'idle' | 'processing' | 'completed'
    statusPill.className = `status-pill ${status}`;
    statusPill.textContent = status.charAt(0).toUpperCase() + status.slice(1);
  }

  function updateScoreCard(passCount, failCount, errorCount, uploadedTotal) {
    const attempted = passCount + failCount + errorCount;
    if (uploadedTotal === 0) {
      scoreValue.textContent = '—';
      scoreValue.classList.remove('pass');
      scoreLabel.textContent = 'Pass Rate';
      scoreStats.innerHTML = '<span class="stats-empty">No checklist run yet</span>';
      return;
    }
    const pct = attempted > 0 ? Math.round((passCount / attempted) * 100) : 0;
    scoreValue.textContent = `${pct}%`;
    scoreValue.classList.toggle('pass', attempted === uploadedTotal && passCount === uploadedTotal);
    scoreLabel.textContent = 'Pass Rate';

    const rows = [
      { label: 'Uploaded', value: uploadedTotal },
      { label: 'Passed', value: passCount },
      { label: 'Failed', value: failCount }
    ];
    if (errorCount > 0) rows.push({ label: 'Errors', value: errorCount });

    scoreStats.innerHTML = rows.map(r =>
      `<div class="stat-row"><span class="stat-label">${r.label}</span><span class="stat-value">${r.value}</span></div>`
    ).join('');
  }

  // --- API Call ---
  async function callGemini(apiKey, model, base64, mimeType, prompt) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent`;
    const body = {
      contents: [{ role: 'user', parts: [ { text: prompt }, { inline_data: { mime_type: mimeType, data: base64 } } ] }],
      generationConfig: { responseMimeType: 'application/json', temperature: 0.2 }
    };
    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey }, body: JSON.stringify(body) });
    if (!res.ok) throw new Error(`API Error ${res.status}`);
    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) throw new Error('Empty response');
    try {
      return JSON.parse(text.replace(/^```json\s*|^```\s*|\s*```$/gim, '').trim());
    } catch(e) { throw new Error('Failed to parse JSON'); }
  }

  // --- Execution ---
  runBtn.addEventListener('click', async () => {
    const apiKey = apiKeyInput.value.trim();
    if (!apiKey) { alert('Please enter your Gemini API Key.'); return; }

    const activeItems = state.checklists.filter(c => c.file !== null);
    if (activeItems.length === 0) { alert('Please upload an image to at least one checklist to evaluate.'); return; }

    const model = modelSelect.value;
    const delay = parseInt(delayInput.value, 10) || 1000;

    runBtn.disabled = true;
    clearBtn.disabled = true;
    exportBtn.style.display = 'none';
    runBtn.textContent = 'Running...';
    resultsFeed.innerHTML = '';
    state.results = [];
    setStatus('processing');
    let passCount = 0, failCount = 0, errorCount = 0;

    for (let i = 0; i < activeItems.length; i++) {
      const item = activeItems[i];
      const { base64, mimeType } = splitDataUrl(item.thumbBase64);
      let parsedResponse;
      let isError = false;

      try {
        parsedResponse = await callGemini(apiKey, model, base64, mimeType, item.promptText);
      } catch (err) {
        isError = true;
        parsedResponse = {
          checklist_number: item.id,
          checklist_name: item.label,
          clear_image_check: "N/A",
          checklist_result: "ERROR",
          confidence: 0,
          reason: `API Error: ${err.message}`
        };
      }

      // Format normalizations
      const clearCheck = String(parsedResponse.clear_image_check || 'NO').toUpperCase();
      const resultPass = String(parsedResponse.checklist_result || 'FAIL').toUpperCase() === 'PASS';
      const resultString = resultPass ? 'PASS' : (isError ? 'ERROR' : 'FAIL');
      const badgeClass = isError ? 'error' : (resultPass ? 'pass' : 'fail');
      const clearBadgeClass = clearCheck === 'YES' ? 'pass' : (clearCheck === 'NO' ? 'fail' : 'neutral');

      const finalResult = {
        id: item.id,
        label: item.label,
        filename: item.filename,
        thumb: item.thumbBase64,
        clear_image_check: clearCheck,
        checklist_result: resultString,
        confidence: parsedResponse.confidence || 0,
        reason: parsedResponse.reason || 'No reason provided.'
      };

      state.results.push(finalResult);
      if (resultPass && !isError) passCount++;
      else if (isError) errorCount++;
      else failCount++;

      const feedItem = document.createElement('div');
      feedItem.className = 'feed-item';
      feedItem.innerHTML = `
        <img src="${finalResult.thumb}" class="feed-thumb" alt="thumb">
        <div>
          <div class="feed-body">
            <h3>#${finalResult.id}: ${finalResult.label}</h3>
            <p class="feed-reason">${finalResult.reason}</p>
          </div>
          <div class="feed-badges">
            <span class="status-badge ${badgeClass}">Result: ${finalResult.checklist_result}</span>
            <span class="status-badge ${clearBadgeClass}">Clear Image: ${finalResult.clear_image_check}</span>
            <span class="conf-pill">Conf: ${finalResult.confidence}%</span>
          </div>
        </div>
      `;
      resultsFeed.appendChild(feedItem);

      updateScoreCard(passCount, failCount, errorCount, activeItems.length);

      if (i < activeItems.length - 1) await sleep(delay);
    }

    setStatus('completed');
    runBtn.disabled = false;
    clearBtn.disabled = false;
    runBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 4.5v15l13-7.5-13-7.5Z" fill="currentColor"/></svg> Run Audit`;
    exportBtn.style.display = 'block';
  });

  // --- Clear current results / start new checklist ---
  clearBtn.addEventListener('click', () => {
    state.checklists.forEach((item) => {
      item.file = null;
      item.filename = 'No file selected';
      item.thumbBase64 = null;
    });
    state.results = [];
    state.currentPage = 1;

    resultsFeed.innerHTML = '<div class="empty-state">Upload images on the left and run the audit. Un-uploaded checklists will be skipped automatically.</div>';
    exportBtn.style.display = 'none';
    setStatus('idle');
    updateScoreCard(0, 0, 0, 0);
    renderPage();
  });

  // --- Export CSV ---
  exportBtn.addEventListener('click', () => {
    if (state.results.length === 0) return;
    
    const headers = [
      'checklist_number',
      'checklist_name',
      'image_filename',
      'clear_image_check',
      'checklist_result',
      'confidence',
      'reason'
    ];
    
    const rows = state.results.map(r => [
      r.id,
      escapeCsv(r.label),
      escapeCsv(r.filename),
      escapeCsv(r.clear_image_check),
      escapeCsv(r.checklist_result),
      r.confidence,
      escapeCsv(r.reason)
    ]);
    
    const csvContent = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
    const blob = new Blob([csvContent], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `audit_results_${new Date().toISOString().replace(/[:.]/g, '-')}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

})();
</script>
</body>
</html>
